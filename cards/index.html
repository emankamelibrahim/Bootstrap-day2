<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body data-bs-spy="scroll" data-bs-target="#navbar-spy" data-bs-offset="70">

    <div class="container my-4">

      <ul class="nav nav-tabs mb-3" id="viewTabs">
        <li class="nav-item">
          <a class="nav-link active" data-bs-toggle="tab" href="#tab-grid">Grid
            View</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-bs-toggle="tab" href="#tab-list">List
            View</a>
        </li>
      </ul>

      <ul class="nav nav-pills card-header-pills mb-3" id="stockFilter">
        <li class="nav-item">
          <a class="nav-link active" href="#" data-filter="all">All</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-filter="instock">In Stock</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-filter="outofstock">Out of Stock</a>
        </li>
      </ul>

      <div id="loader" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">Loading products...</p>
      </div>

      <div class="tab-content" id="tabContent" style="display:none;">

        <div class="tab-pane fade show active" id="tab-grid">
          <div id="grid-container" class="row g-3"></div>
        </div>

        <div class="tab-pane fade" id="tab-list">
          <div id="list-container"></div>
        </div>

      </div>

      <nav class="mt-4">
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </nav>

    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
