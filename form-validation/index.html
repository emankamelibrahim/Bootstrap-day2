<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet" />
    </head>
    <body>
        <div class="p-5 ">

            <form class="needs-validation" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control"
                                id="inputEmail" placeholder=" " required>
                            <label for="inputEmail">Email</label>
                            <div class="invalid-feedback">Please provide a valid
                                email address.</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control"
                                id="inputPassword" placeholder=" "
                                minlength="8" required>
                            <label for="inputPassword">Password</label>
                            <div class="invalid-feedback">Password is required
                                (min 8 characters).</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control"
                                id="inputAddress" placeholder=" " required>
                            <label for="inputAddress">Address</label>
                            <div class="invalid-feedback">Please enter your
                                address.</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control"
                                id="inputAddress2" placeholder=" ">
                            <label for="inputAddress2">Address 2</label>
                            <div class="invalid-feedback">Please enter a valid
                                address line 2 or leave it blank.</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <select id="inputState" class="form-select"
                                required>
                                <option value selected
                                    disabled>Choose...</option>
                                <option value="AL">Alexandria</option>
                                <option value="CA">Cairo</option>
                                <option value="GZ">Giza</option>
                            </select>
                            <label for="inputState">State</label>
                            <div class="invalid-feedback">Please select a
                                state.</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control"
                                id="inputZip" placeholder=" " pattern="\d{5}"
                                inputmode="numeric" required>
                            <label for="inputZip">Zip</label>
                            <div class="invalid-feedback">Please enter a valid
                                5-digit ZIP code.</div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox"
                                id="gridCheck" required>
                            <label class="form-check-label"
                                for="gridCheck">Agree to terms</label>
                            <div class="invalid-feedback">You must agree before
                                submitting.</div>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Sign
                            in</button>
                    </div>
                </div>
            </form>
        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
